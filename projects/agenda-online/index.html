<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Online — Lucas Back</title>
  <style>
    /* ================================================
       RESET E BASE
       ================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0F0F0F;
      --bg-card:     #1A1A2E;
      --bg-input:    #0F0F1A;
      --bg-elevated: #20203A;
      --accent:      #6C63FF;
      --accent-dim:  rgba(108, 99, 255, 0.12);
      --accent-rgb:  108, 99, 255;
      --green:       #00D4AA;
      --green-dim:   rgba(0, 212, 170, 0.12);
      --green-rgb:   0, 212, 170;
      --text:        #FFFFFF;
      --text-muted:  #A0A0B0;
      --text-dim:    #555566;
      --border:      #2A2A3E;
      --border-hover:#3A3A5E;
      --radius-sm:   6px;
      --radius-md:   12px;
      --radius-lg:   16px;
      --radius-full: 9999px;
      --font-mono:   'Courier New', 'Consolas', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      min-height: 100vh;
    }

    button { cursor: pointer; font-family: inherit; }
    input, textarea { font-family: inherit; }

    /* ================================================
       BARRA DE VOLTA AO PORTFÓLIO
       ================================================ */
    .back-bar {
      position: sticky;
      top: 0;
      background: rgba(26, 26, 46, 0.97);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 100;
    }

    .back-bar a {
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.15s;
    }
    .back-bar a:hover { color: var(--accent); }

    .back-bar .sep   { color: var(--border); font-size: 0.9rem; }
    .back-bar .curr  { color: var(--accent); font-family: var(--font-mono); font-size: 0.78rem; }

    /* ================================================
       HERO DA AGENDA
       ================================================ */
    .hero-agenda {
      text-align: center;
      padding: 3rem 1.5rem 2rem;
      position: relative;
    }

    /* Gradiente sutil no fundo do hero */
    .hero-agenda::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(var(--accent-rgb), 0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-agenda h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      position: relative;
    }

    .hero-agenda p {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-size: 0.95rem;
      position: relative;
    }

    .tech-badge {
      display: inline-block;
      margin-top: 1rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(var(--accent-rgb), 0.25);
      padding: 0.2rem 0.85rem;
      border-radius: var(--radius-full);
      position: relative;
    }

    /* ================================================
       FORMULÁRIO DE ADIÇÃO
       ================================================ */
    .form-section {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
    }

    .form-section h2 {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }

    /* Em desktop: todos os campos ficam em linha */
    .add-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* Campos do formulário */
    .form-input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      width: 100%;
    }
    .form-input::placeholder { color: var(--text-dim); }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.1);
    }

    /* Input de data e hora — remove estilo nativo na maioria dos browsers */
    input[type="date"],
    input[type="time"] {
      color-scheme: dark;
      min-width: 0;
    }

    /* Botão de adicionar */
    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      padding: 0.65rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-add:hover  { background: #5A52E0; }
    .btn-add:active { transform: scale(0.97); }

    /* Mensagem de validação */
    .form-msg {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: #FF6B6B;
      min-height: 1rem;
    }

    /* ================================================
       SEÇÃO DE LISTA
       ================================================ */
    .list-section {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    .list-header {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .list-title {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ================================================
       BARRA DE FILTROS
       ================================================ */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .filter-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: var(--font-mono);
      padding: 0.35rem 0.9rem;
      border-radius: var(--radius-full);
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Contador de itens */
    .list-count {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    /* ================================================
       LISTA DE COMPROMISSOS
       ================================================ */
    .appointments-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    /* Item individual */
    .appt-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.9rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: border-color 0.18s, opacity 0.25s, transform 0.25s;
    }
    .appt-item:hover { border-color: var(--border-hover); }

    /* Animação de remoção — JS adiciona .removing antes de deletar */
    .appt-item.removing {
      opacity: 0;
      transform: translateX(20px);
    }

    /* Quando concluído: opacidade reduzida */
    .appt-item.is-done {
      opacity: 0.55;
    }

    /* Informações do compromisso */
    .appt-info {
      flex: 1;
      min-width: 0; /* permite text-overflow funcionar dentro do flex */
    }

    .appt-title {
      display: block;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Título riscado quando concluído */
    .appt-item.is-done .appt-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .appt-time {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 0.15rem;
    }

    /* Ações (badge + botões) */
    .appt-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    /* Badges de status */
    .appt-badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-full);
      white-space: nowrap;
    }

    /* Hoje — vermelho */
    .badge-hoje {
      background: rgba(255, 80, 80, 0.12);
      color: #FF6B6B;
      border: 1px solid rgba(255, 80, 80, 0.25);
    }

    /* Em breve (≤ 2h) — laranja */
    .badge-em-breve {
      background: rgba(255, 165, 0, 0.12);
      color: #FFA500;
      border: 1px solid rgba(255, 165, 0, 0.25);
    }

    /* Próximo (≤ 3 dias) — roxo */
    .badge-proximo {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(var(--accent-rgb), 0.25);
    }

    /* Futuro — cinza */
    .badge-futuro {
      background: rgba(160, 160, 176, 0.08);
      color: var(--text-dim);
      border: 1px solid rgba(160, 160, 176, 0.15);
    }

    /* Concluído — verde */
    .badge-concluido {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(var(--green-rgb), 0.25);
    }

    /* Atrasado — vermelho escuro */
    .badge-atrasado {
      background: rgba(255, 50, 50, 0.1);
      color: #FF4444;
      border: 1px solid rgba(255, 50, 50, 0.2);
    }

    /* Botões de ação por item */
    .btn-action {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-dim);
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .btn-check:hover {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }

    .btn-delete:hover {
      background: rgba(255, 80, 80, 0.1);
      border-color: rgba(255, 80, 80, 0.35);
      color: #FF6B6B;
    }

    /* Item concluído: botão check fica verde fixo */
    .appt-item.is-done .btn-check {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }

    /* ================================================
       ESTADO VAZIO
       ================================================ */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      opacity: 0.3;
      margin-bottom: 0.75rem;
    }

    .empty-state p {
      font-family: var(--font-mono);
      font-size: 0.82rem;
    }

    /* ================================================
       FOOTER
       ================================================ */
    footer {
      text-align: center;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    /* ================================================
       RESPONSIVIDADE — Desktop (600px+)
       ================================================ */
    @media (min-width: 600px) {
      /* Formulário em linha: [título flexível] [data] [hora] [botão] */
      .form-row {
        flex-direction: row;
        align-items: stretch;
      }

      .form-row .form-input:first-child {
        flex: 1; /* campo de título ocupa o espaço disponível */
      }

      input[type="date"],
      input[type="time"] {
        width: auto;
        min-width: 130px;
      }
    }
  </style>
</head>
<body>

  <!-- Barra de navegação de volta ao portfólio -->
  <header>
    <nav class="back-bar">
      <a href="../../index.html" aria-label="Voltar ao portfólio de Lucas Back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        dev.back
      </a>
      <span class="sep">/</span>
      <span class="curr">Agenda Online</span>
    </nav>
  </header>

  <main>

    <!-- Hero da agenda -->
    <section class="hero-agenda">
      <h1>📅 Agenda Online</h1>
      <p>Gerencie seus compromissos e tarefas do dia a dia.</p>
      <span class="tech-badge">HTML · CSS · JavaScript · localStorage</span>
    </section>


    <!-- Formulário para adicionar compromisso -->
    <section class="form-section" aria-labelledby="form-heading">
      <h2 id="form-heading">// novo compromisso</h2>

      <form class="add-form" id="add-form" novalidate>

        <!--
          Em mobile: campos empilhados (flex-direction: column)
          Em desktop (600px+): campos em linha (flex-direction: row)
          O campo de título usa flex:1 para ocupar o espaço restante.
        -->
        <div class="form-row">
          <input
            type="text"
            class="form-input"
            id="title-input"
            placeholder="Título do compromisso"
            aria-label="Título do compromisso"
            maxlength="80"
            autocomplete="off"
          />
          <input
            type="date"
            class="form-input"
            id="date-input"
            aria-label="Data do compromisso"
          />
          <input
            type="time"
            class="form-input"
            id="time-input"
            aria-label="Hora do compromisso"
          />
          <button type="submit" class="btn-add" aria-label="Adicionar compromisso">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Adicionar
          </button>
        </div>

        <!-- Mensagem de validação inline -->
        <p class="form-msg" id="form-msg" role="alert" aria-live="polite"></p>

      </form>
    </section>


    <!-- Lista de compromissos com filtros -->
    <section class="list-section" aria-labelledby="list-heading">

      <div class="list-header">
        <span class="list-title" id="list-heading">// compromissos</span>

        <!-- Filtros: delegação de evento no container -->
        <div class="filter-bar" id="filter-bar" role="group" aria-label="Filtrar compromissos">
          <button class="filter-btn active" data-filter="todos">Todos</button>
          <button class="filter-btn"        data-filter="hoje">Hoje</button>
          <button class="filter-btn"        data-filter="pendentes">Pendentes</button>
          <button class="filter-btn"        data-filter="concluidos">Concluídos</button>
        </div>

        <span class="list-count" id="list-count" aria-live="polite"></span>
      </div>

      <!-- Lista renderizada pelo JS — ul semântico -->
      <ul class="appointments-list" id="appointments-list" aria-label="Lista de compromissos">
      </ul>

    </section>

  </main>


  <footer>
    <p>
      Projeto de estudo · Lucas Back ·
      <a href="../../index.html">Portfólio completo</a>
    </p>
  </footer>


  <script>
    /* ================================================
       ESTADO DA APLICAÇÃO
       Todos os dados vivem aqui — único source of truth.
       ================================================ */
    const state = {
      appointments: [], /* array de objetos { id, title, date, time, done } */
      filter:       'todos', /* filtro ativo: 'todos' | 'hoje' | 'pendentes' | 'concluidos' */
      nextId:       1,  /* auto-incremento de ID para garantir unicidade */
    };

    /* ================================================
       PERSISTÊNCIA — localStorage
       Salva e carrega o estado completo da aplicação.
       ================================================ */
    const STORAGE_KEY = 'agenda-lucas-back';

    function save() {
      /* Serializa o estado para string JSON e salva no localStorage.
         localStorage só aceita strings — JSON.stringify converte o objeto. */
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        appointments: state.appointments,
        nextId:       state.nextId,
      }));
    }

    function load() {
      const raw = localStorage.getItem(STORAGE_KEY);

      if (raw) {
        /* JSON.parse converte a string de volta para objeto JavaScript */
        const saved = JSON.parse(raw);
        state.appointments = saved.appointments || [];
        state.nextId       = saved.nextId       || 1;
      } else {
        /* Primeira visita: criar dois compromissos de exemplo
           para o usuário entender como a agenda funciona.
           As datas são geradas dinamicamente (amanhã e semana que vem). */
        const amanha    = new Date();
        amanha.setDate(amanha.getDate() + 1);
        const semanaQVem = new Date();
        semanaQVem.setDate(semanaQVem.getDate() + 7);

        /* toISOString retorna "YYYY-MM-DDTHH:mm:ss.sssZ"
           .split('T')[0] pega só a parte "YYYY-MM-DD" */
        state.appointments = [
          {
            id:    1,
            title: 'Reunião com recrutadora',
            date:  amanha.toISOString().split('T')[0],
            time:  '10:00',
            done:  false,
          },
          {
            id:    2,
            title: 'Estudar React Hooks',
            date:  semanaQVem.toISOString().split('T')[0],
            time:  '19:00',
            done:  false,
          },
        ];
        state.nextId = 3;
        save(); /* salva os exemplos imediatamente */
      }
    }

    /* ================================================
       STATUS DO COMPROMISSO
       Retorna objeto { key, label, cls } baseado na data/hora atual.
       Chamado a cada render para sempre refletir o tempo atual.
       ================================================ */
    function getStatus(appt) {
      /* Concluído tem prioridade — não precisa verificar datas */
      if (appt.done) {
        return { key: 'concluido', label: 'Concluído', cls: 'badge-concluido' };
      }

      const now  = new Date();
      /* new Date('YYYY-MM-DDTHH:MM') cria um Date com data e hora locais */
      const apptDt = new Date(`${appt.date}T${appt.time}`);
      const diffMs = apptDt - now; /* diferença em milissegundos (positivo = futuro) */

      /* Passado e não concluído → atrasado */
      if (diffMs < 0) {
        return { key: 'atrasado', label: 'Atrasado', cls: 'badge-atrasado' };
      }

      const diffHoras = diffMs / 3_600_000; /* 1h = 3.600.000ms */
      const diffDias  = diffMs / 86_400_000; /* 1d = 86.400.000ms */

      /* Nas próximas 2 horas — urgente */
      if (diffHoras <= 2) {
        return { key: 'em-breve', label: 'Em breve', cls: 'badge-em-breve' };
      }

      /* Hoje (mesma data, mas mais de 2h de distância) */
      const hojeStr   = now.toISOString().split('T')[0];
      if (appt.date === hojeStr) {
        return { key: 'hoje', label: 'Hoje', cls: 'badge-hoje' };
      }

      /* Próximos 3 dias */
      if (diffDias <= 3) {
        return { key: 'proximo', label: 'Próximo', cls: 'badge-proximo' };
      }

      /* Mais distante */
      return { key: 'futuro', label: 'Futuro', cls: 'badge-futuro' };
    }

    /* ================================================
       FILTRO — retorna apenas os compromissos visíveis
       ================================================ */
    function getFiltered() {
      const hojeStr = new Date().toISOString().split('T')[0];

      return state.appointments.filter((appt) => {
        switch (state.filter) {
          case 'hoje':
            /* Mostra compromissos de hoje, independente de estar concluído */
            return appt.date === hojeStr;
          case 'pendentes':
            return !appt.done;
          case 'concluidos':
            return appt.done;
          default: /* 'todos' */
            return true;
        }
      });
    }

    /* ================================================
       FORMATAR DATA — "2026-05-28" + "14:30" → "28 mai · 14:30"
       ================================================ */
    const MESES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

    function formatarData(dateStr, timeStr) {
      /* Concatena com 'T' para criar um Date local sem timezone issues */
      const dt  = new Date(`${dateStr}T${timeStr}`);
      const dia = dt.getDate();
      const mes = MESES[dt.getMonth()];
      /* padStart(2, '0') garante que "9:5" vire "09:05" */
      const h   = String(dt.getHours()).padStart(2, '0');
      const m   = String(dt.getMinutes()).padStart(2, '0');
      return `${dia} ${mes} · ${h}:${m}`;
    }

    /* ================================================
       RENDER — reconstrói a lista do zero a cada mudança
       É mais simples que atualizar só o item alterado,
       e com poucos itens a performance é idêntica.
       ================================================ */
    function render() {
      const list    = document.getElementById('appointments-list');
      const counter = document.getElementById('list-count');
      const filtered = getFiltered();

      /* Atualiza o contador de itens */
      counter.textContent = `${filtered.length} item${filtered.length !== 1 ? 's' : ''}`;

      /* Lista vazia — mostra estado vazio amigável */
      if (filtered.length === 0) {
        const msgs = {
          todos:      'Nenhum compromisso ainda. Que tal adicionar um?',
          hoje:       'Nenhum compromisso para hoje.',
          pendentes:  'Tudo certo! Nenhum compromisso pendente.',
          concluidos: 'Nenhum compromisso concluído ainda.',
        };
        list.innerHTML = `
          <li>
            <div class="empty-state" role="status">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <p>${msgs[state.filter] || msgs.todos}</p>
            </div>
          </li>
        `;
        return;
      }

      /* Ordenação: pendentes primeiro (por data), concluídos por último */
      const sorted = [...filtered].sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        /* Dentro de cada grupo, ordena por data+hora crescente */
        return new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`);
      });

      /* Constrói o HTML de todos os itens de uma vez e injeta no DOM
         Isso é mais performático do que criar elementos um a um */
      list.innerHTML = sorted.map((appt) => {
        const status = getStatus(appt);
        const isDone = appt.done ? 'is-done' : '';

        return `
          <li class="appt-item ${isDone}" data-id="${appt.id}">

            <div class="appt-info">
              <span class="appt-title">${escapeHtml(appt.title)}</span>
              <span class="appt-time">${formatarData(appt.date, appt.time)}</span>
            </div>

            <div class="appt-actions">
              <span class="appt-badge ${status.cls}" aria-label="Status: ${status.label}">${status.label}</span>

              <!-- Botão ✓ alterna entre concluído e pendente -->
              <button
                class="btn-action btn-check"
                data-action="toggle"
                data-id="${appt.id}"
                aria-label="${appt.done ? 'Marcar como pendente' : 'Marcar como concluído'}"
                title="${appt.done ? 'Marcar como pendente' : 'Marcar como concluído'}"
              >✓</button>

              <!-- Botão ✕ remove o item com fade-out -->
              <button
                class="btn-action btn-delete"
                data-action="delete"
                data-id="${appt.id}"
                aria-label="Remover compromisso"
                title="Remover"
              >✕</button>
            </div>

          </li>
        `;
      }).join('');
    }

    /* ================================================
       ESCAPE HTML — evita XSS ao exibir texto do usuário
       Ex: um título malicioso deve aparecer como texto,
       não executar como código HTML ou JavaScript.
       ================================================ */
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ================================================
       EVENTOS — FORMULÁRIO DE ADIÇÃO
       ================================================ */
    document.getElementById('add-form').addEventListener('submit', (e) => {
      e.preventDefault(); /* impede o recarregamento da página */

      const titleInput = document.getElementById('title-input');
      const dateInput  = document.getElementById('date-input');
      const timeInput  = document.getElementById('time-input');
      const msg        = document.getElementById('form-msg');

      const title = titleInput.value.trim();
      const date  = dateInput.value;
      const time  = timeInput.value;

      /* Validação simples — todos os campos são obrigatórios */
      if (!title) { msg.textContent = 'Informe o título do compromisso.'; titleInput.focus(); return; }
      if (!date)  { msg.textContent = 'Selecione uma data.';              dateInput.focus();  return; }
      if (!time)  { msg.textContent = 'Selecione um horário.';            timeInput.focus();  return; }

      msg.textContent = ''; /* limpa mensagem de erro se tudo estiver OK */

      /* Cria o novo compromisso e empurra no array */
      state.appointments.push({
        id:    state.nextId++,
        title,
        date,
        time,
        done:  false,
      });

      save();   /* persiste no localStorage */
      render(); /* atualiza a lista na tela */

      e.target.reset(); /* limpa o formulário */
      titleInput.focus(); /* devolve o foco para o campo de título */
    });

    /* ================================================
       EVENTOS — TOGGLE E DELETE (delegação de evento)
       Um único listener no <ul> captura cliques de todos os botões.
       Isso é mais eficiente do que adicionar listeners em cada item,
       especialmente porque a lista é reconstruída a cada render.
       ================================================ */
    document.getElementById('appointments-list').addEventListener('click', (e) => {
      /* closest() sobe na árvore DOM até encontrar [data-action] */
      const btn = e.target.closest('[data-action]');
      if (!btn) return;

      const id     = Number(btn.dataset.id);
      const action = btn.dataset.action;

      if (action === 'toggle') {
        /* Encontra o compromisso pelo ID e inverte o estado done */
        const appt = state.appointments.find((a) => a.id === id);
        if (appt) {
          appt.done = !appt.done;
          save();
          render();
        }
      }

      if (action === 'delete') {
        /* Adiciona classe .removing para a animação de fade-out,
           depois espera 250ms (duração da transition CSS) antes de remover do array */
        const item = btn.closest('.appt-item');
        if (item) {
          item.classList.add('removing');
          setTimeout(() => {
            state.appointments = state.appointments.filter((a) => a.id !== id);
            save();
            render();
          }, 250);
        }
      }
    });

    /* ================================================
       EVENTOS — FILTROS (delegação de evento)
       ================================================ */
    document.getElementById('filter-bar').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-filter]');
      if (!btn) return;

      state.filter = btn.dataset.filter;

      /* Atualiza o estilo dos botões — remove .active de todos, adiciona no clicado */
      document.querySelectorAll('[data-filter]').forEach((b) => {
        b.classList.toggle('active', b === btn);
      });

      render();
    });

    /* ================================================
       INICIALIZAÇÃO
       Ordem: carregar dados → renderizar
       ================================================ */
    load();
    render();
  </script>

</body>
</html>
